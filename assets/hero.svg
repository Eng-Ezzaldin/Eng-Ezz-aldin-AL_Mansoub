<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020024"/>
      <stop offset="0.28" stop-color="#090979"/>
      <stop offset="0.52" stop-color="#02569B"/>
      <stop offset="0.75" stop-color="#7F00FF"/>
      <stop offset="1" stop-color="#020024"/>
    </linearGradient>

    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7F00FF" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#7F00FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#00E5FF" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="520" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="36" fill="url(#grid)"/>

  <circle cx="160" cy="90" r="170" fill="url(#glow1)"/>
  <circle cx="1040" cy="420" r="210" fill="url(#glow2)"/>
  <circle cx="950" cy="90" r="115" fill="#00FFB3" fill-opacity="0.08"/>
  <circle cx="250" cy="445" r="130" fill="#7F00FF" fill-opacity="0.12"/>

  <path d="M75 420 C220 300, 345 490, 520 345 C710 185, 860 375, 1110 210" stroke="#00E5FF" stroke-width="3" stroke-opacity="0.45" filter="url(#neon)"/>
  <path d="M90 150 C250 260, 420 95, 590 210 C770 335, 940 110, 1115 270" stroke="#7F00FF" stroke-width="3" stroke-opacity="0.42" filter="url(#neon)"/>

  <g opacity="0.85">
    <circle cx="110" cy="120" r="3" fill="#FFFFFF"/>
    <circle cx="230" cy="70" r="2.5" fill="#00E5FF"/>
    <circle cx="360" cy="125" r="2" fill="#FFFFFF"/>
    <circle cx="500" cy="80" r="2.5" fill="#00FFB3"/>
    <circle cx="710" cy="125" r="2" fill="#FFFFFF"/>
    <circle cx="860" cy="75" r="2.5" fill="#00E5FF"/>
    <circle cx="1045" cy="125" r="2" fill="#FFFFFF"/>
    <circle cx="1120" cy="75" r="3" fill="#7F00FF"/>
    <circle cx="150" cy="380" r="2.5" fill="#00E5FF"/>
    <circle cx="330" cy="430" r="2" fill="#FFFFFF"/>
    <circle cx="690" cy="430" r="2.5" fill="#00FFB3"/>
    <circle cx="1040" cy="360" r="2" fill="#FFFFFF"/>
  </g>

  <g transform="translate(64,64)">
    <rect x="0" y="0" width="1072" height="392" rx="30" fill="#050816" fill-opacity="0.68" stroke="#00E5FF" stroke-opacity="0.48" stroke-width="2" filter="url(#softGlow)"/>
    <rect x="24" y="24" width="1024" height="344" rx="24" fill="#020617" fill-opacity="0.6" stroke="#7F00FF" stroke-opacity="0.38"/>

    <text x="536" y="118" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="900" letter-spacing="5" filter="url(#neon)">
      EZZALDIN ALMANSOUB
    </text>

    <text x="536" y="165" text-anchor="middle" fill="#00E5FF" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="2">
      FLUTTER DEVELOPER  •  LARAVEL BACKEND  •  CYBERSECURITY EXPLORER
    </text>

    <rect x="210" y="205" width="652" height="54" rx="27" fill="#00E5FF" fill-opacity="0.08" stroke="#00E5FF" stroke-opacity="0.55"/>
    <text x="536" y="240" text-anchor="middle" fill="#00FFB3" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">
      CODE • BUILD • SECURE • EVOLVE
    </text>

    <g transform="translate(185,292)">
      <rect x="0" y="0" width="210" height="46" rx="23" fill="#02569B" fill-opacity="0.95"/>
      <text x="105" y="30" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="15" font-weight="800">📱 FLUTTER</text>

      <rect x="238" y="0" width="210" height="46" rx="23" fill="#FF2D20" fill-opacity="0.95"/>
      <text x="343" y="30" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="15" font-weight="800">🔥 LARAVEL</text>

      <rect x="476" y="0" width="210" height="46" rx="23" fill="#111827" stroke="#00FFB3" stroke-opacity="0.8"/>
      <text x="581" y="30" text-anchor="middle" fill="#00FFB3" font-family="Arial" font-size="15" font-weight="800">🛡 CYBER</text>
    </g>
  </g>
</svg>
